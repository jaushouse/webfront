{{ define "main" }}
<section class="page">
  <div class="container container-narrow">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="page-subtitle">{{ . }}</p>{{ end }}
    </header>
    <div class="post-list">
      {{ range .Pages }}
      <article class="post-entry">
        <a href="{{ .Permalink }}">
          <time class="post-date mono" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02, 2006" }}</time>
          <h3 class="post-title">{{ .Title }}</h3>
          {{ with .Summary }}<p class="post-excerpt">{{ . | truncate 160 }}</p>{{ end }}
        </a>
      </article>
      {{ end }}
    </div>
    {{ template "_internal/pagination.html" . }}
  </div>
</section>
{{ end }}
