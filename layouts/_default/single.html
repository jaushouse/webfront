{{ define "main" }}
<article class="page">
  <div class="container container-narrow">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
      {{ with .Params.bullets }}
      <ul class="page-bullets">
        {{ range . }}<li>{{ . }}</li>{{ end }}
      </ul>
      {{ end }}
    </header>
    <div class="page-content">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
